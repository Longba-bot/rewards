<!DOCTYPE html>
<html>
<head>
    <title>Your Reward Key</title>
    <style>
        body {
            background-image: url('https://i.pinimg.com/originals/7f/c5/94/7fc59457316a35163b8a5dc4d4cb7b83.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
        }
        h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .key-box {
            background: #23272a;
            border: 2px solid #9B59B6;
            border-radius: 12px;
            display: inline-block;
            padding: 20px 40px;
            font-size: 30px;
            letter-spacing: 4px;
            font-weight: bold;
            color: #9B59B6;
            cursor: pointer;
            transition: background 0.2s;
            user-select: all;
        }
        .key-box:hover {
            background: #2e2040;
        }
        .copy-hint {
            color: #aaa;
            font-size: 13px;
            margin-top: 14px;
        }
        .steps {
            margin-top: 36px;
            color: #ccc;
            font-size: 15px;
            line-height: 2;
        }
        .steps span {
            color: #9B59B6;
            font-weight: bold;
        }
        .error {
            color: #e74c3c;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>🎁 Ads Complete! Here is your Reward Key</h2>
    <p class="subtitle">Copy this key and paste it in Discord.</p>

    <div class="key-box" id="keyBox">Loading...</div>
    <p class="copy-hint" id="hint">Click the key to copy!</p>

    <div class="steps">
        1. Copy the key above<br>
        2. Go back to Discord<br>
        3. Click <span>"I have a key"</span> button<br>
        4. Paste the key and claim your <span>6x🎁 Gifts!</span>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const key = params.get('k');
        const box = document.getElementById('keyBox');
        const hint = document.getElementById('hint');

        if (key) {
            box.textContent = key;
            box.onclick = () => {
                navigator.clipboard.writeText(key).then(() => {
                    box.textContent = '✅ Copied!';
                    hint.textContent = 'Key copied to clipboard!';
                    setTimeout(() => {
                        box.textContent = key;
                        hint.textContent = 'Click the key to copy!';
                    }, 2000);
                });
            };
        } else {
            box.textContent = '❌ No key found.';
            box.style.color = '#e74c3c';
            box.style.borderColor = '#e74c3c';
            hint.textContent = 'Please try again with /watchads in Discord.';
        }
    </script>
</body>
</html>
